<h2>Subscription Approval</h2>

<table border="1">
  <tr>
    <th>ID</th>
    <th>User</th>
    <th>Plan</th>
    <th>Status</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let sub of subscriptions">
    <td>{{sub.subscriptionId}}</td>
    <td>{{sub.userId}}</td>
    <td>{{sub.planId}}</td>
    <td>{{sub.paymentStatus}}</td>
    <td>
      <button (click)="approve(sub.subscriptionId)">Approve</button>
    </td>
  </tr>
</table>
