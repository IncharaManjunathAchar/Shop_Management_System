<h2>Admin Dashboard</h2>

<h3>Subscribed Shopkeepers</h3>

<table border="1">
  <tr>
    <th>Subscription ID</th>
    <th>User ID</th>
    <th>Plan ID</th>
    <th>Start Date</th>
    <th>Expiry Date</th>
    <th>Status</th>
  </tr>

  <tr *ngFor="let sub of subscriptions">
    <td>{{ sub.subscriptionId }}</td>
    <td>{{ sub.userId }}</td>
    <td>{{ sub.planId }}</td>
    <td>{{ sub.startDate | date }}</td>
    <td>{{ sub.expiryDate | date }}</td>
    <td>{{ sub.paymentStatus }}</td>
  </tr>
</table>
