<div class="fp-container">
  <div class="fp-card">

    <div class="fp-logo">
      <img src="assests/Logo.png" alt="logo" />
    </div>

    <h2>{{ step === 'email' ? 'Forgot Password' : 'Reset Password' }}</h2>
    <p class="subtitle">{{ step === 'email' ? 'Enter your email to receive an OTP' : 'Enter the OTP sent to ' + email }}</p>

    <div class="msg success" *ngIf="successMsg">✅ {{ successMsg }}</div>
    <div class="msg error"   *ngIf="errorMsg">🔴 {{ errorMsg }}</div>

    <!-- Step 1: Email -->
    <div *ngIf="step === 'email'">
      <div class="field">
        <label>Email Address</label>
        <input [(ngModel)]="email" type="email" placeholder="Enter your registered email" />
      </div>
      <button class="btn-primary" (click)="sendOtp()" [disabled]="loading">
        {{ loading ? 'Sending OTP...' : 'Send OTP' }}
      </button>
    </div>

    <!-- Step 2: OTP + New Password -->
    <div *ngIf="step === 'otp'">
      <div class="field">
        <label>OTP</label>
        <input [(ngModel)]="otp" placeholder="Enter 6-digit OTP" maxlength="6" />
      </div>
      <div class="field">
        <label>New Password</label>
        <div class="pw-wrap">
          <input [(ngModel)]="newPassword" [type]="showNew ? 'text' : 'password'" placeholder="Enter new password" />
          <span class="eye" (click)="showNew = !showNew">{{ showNew ? '🙈' : '👁️' }}</span>
        </div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input [(ngModel)]="confirmPassword" [type]="showConfirm ? 'text' : 'password'" placeholder="Confirm new password" />
          <span class="eye" (click)="showConfirm = !showConfirm">{{ showConfirm ? '🙈' : '👁️' }}</span>
        </div>
      </div>
      <button class="btn-primary" (click)="resetPassword()" [disabled]="loading">
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>
      <button class="btn-back" (click)="step = 'email'; errorMsg = ''">← Back</button>
    </div>

    <p class="login-link">Remember your password? <a routerLink="/login">Login</a></p>

  </div>
</div>
